---
- name: Add Route

  hosts: cisco_routers

  collections:
    - cisco.ios

  vars:

    destination: 10.10.10.0/24
    next_hop: 192.168.1.1

  tasks:

    - name: Route
      ios_static_routes:

        config:

          - address_families:

            - afi: ipv4

              routes:

                - dest: "{{ destination }}"

                  next_hops:

                    - forward_router_address: "{{ next_hop }}"

        state: merged