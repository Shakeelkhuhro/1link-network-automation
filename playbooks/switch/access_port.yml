---
- name: Configure Access Port

  hosts: cisco_switches

  collections:
    - cisco.ios

  vars:
    interface: GigabitEthernet1/0/10
    vlan_id: 300

  tasks:
    - name: Access Port
      ios_l2_interfaces:

        config:

          - name: "{{ interface }}"

            mode: access

            access:
              vlan: "{{ vlan_id }}"

        state: merged
