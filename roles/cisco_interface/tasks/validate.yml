---
- name: Validate Interface Name
  assert:
    that:
      - interface_name | length > 0

- name: Validate Admin State
  assert:
    that:
      - admin_state in ['', 'up', 'down']

- name: Check Interface Exists
  cisco.ios.ios_command:
    commands:
      - show interfaces {{ interface_name }}
  register: int_check
  ignore_errors: yes

- name: Fail if Interface Missing
  fail:
    msg: "Interface {{ interface_name }} does not exist"
  when: int_check.failed
