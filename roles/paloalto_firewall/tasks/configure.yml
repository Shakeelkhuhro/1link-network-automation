---
- name: Configure Security Rule

  paloaltonetworks.panos.panos_security_rule:

    rule_name: "{{ rule_name }}"

    source_zone:
      - "{{ source_zone }}"

    destination_zone:
      - "{{ destination_zone }}"

    source_ip:
      - "{{ source_ip }}"

    destination_ip:
      - "{{ destination_ip }}"

    application:
      - "{{ application }}"

    action: "{{ action }}"
